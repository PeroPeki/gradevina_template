<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gradnja Jadran | Građevinska firma Rijeka</title>
<meta name="description" content="Građevinska firma Gradnja Jadran iz Rijeke — stambena gradnja, renovacije i fasade, ključ u ruke. 28+ godina iskustva. Besplatna procjena!">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --steel:#2C3E50;
  --steel-dark:#22303F;
  --steel-deep:#1A252F;
  --brick:#E67E22;
  --brick-dark:#C96A12;
  --bg:#F5F5F5;
  --ink:#2D2D2D;
  --card:#FFFFFF;
  --line:#E3E3E3;
  --muted:#6B7683;
  --hazard:repeating-linear-gradient(-45deg,var(--brick) 0 12px,var(--steel-deep) 12px 24px);
  --radius:10px;
  --shadow:0 2px 10px rgba(26,37,47,.08);
  --shadow-lift:0 14px 30px rgba(26,37,47,.16);
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
@media (prefers-reduced-motion:reduce){
  html{scroll-behavior:auto}
  *,*::before,*::after{animation:none!important;transition:none!important}
}
body{
  font-family:'Roboto',system-ui,-apple-system,sans-serif;
  color:var(--ink);
  background:var(--bg);
  line-height:1.65;
  font-size:16px;
}
h1,h2,h3,.oswald{font-family:'Oswald','Roboto Condensed',system-ui,sans-serif;line-height:1.15;color:var(--steel)}
img,svg{max-width:100%;display:block}
a{color:var(--brick);text-decoration:none}
a:hover{text-decoration:underline}
:focus-visible{outline:3px solid var(--brick);outline-offset:3px;border-radius:2px}
.container{max-width:1160px;margin:0 auto;padding:0 24px}
section{padding:88px 0}
.section-alt{background:var(--card)}

/* ---------- eyebrow + section headings ---------- */
.eyebrow{
  display:inline-flex;align-items:center;gap:12px;
  font-family:'Oswald',sans-serif;font-weight:500;font-size:.82rem;
  letter-spacing:.22em;text-transform:uppercase;color:var(--brick);
  margin-bottom:14px;
}
.eyebrow::before{content:"";width:34px;height:8px;background:var(--hazard);border-radius:2px}
.section-title{font-size:clamp(1.7rem,3.4vw,2.5rem);font-weight:600;text-transform:uppercase;letter-spacing:.02em;margin-bottom:14px}
.section-sub{max-width:640px;color:var(--muted);margin-bottom:44px}

/* ---------- header ---------- */
header{
  position:sticky;top:0;z-index:60;
  background:var(--steel);
  box-shadow:0 2px 12px rgba(0,0,0,.25);
}
header::after{content:"";display:block;height:5px;background:var(--hazard)}
.nav{display:flex;align-items:center;gap:28px;height:70px}
.brand{display:flex;align-items:center;gap:11px;color:#fff;font-family:'Oswald',sans-serif;font-size:1.25rem;font-weight:600;letter-spacing:.04em;text-transform:uppercase;text-decoration:none}
.brand:hover{text-decoration:none}
.brand svg{width:36px;height:36px;flex:none}
.brand small{display:block;font-family:'Roboto',sans-serif;font-size:.6rem;font-weight:400;letter-spacing:.28em;color:#9FB2C4;text-transform:uppercase}
.nav-links{display:flex;gap:4px;margin-left:auto;list-style:none}
.nav-links a{
  display:block;padding:9px 15px;color:#D5DEE7;font-family:'Oswald',sans-serif;
  font-size:.86rem;font-weight:500;letter-spacing:.1em;text-transform:uppercase;border-radius:6px;
}
.nav-links a:hover{color:#fff;background:rgba(255,255,255,.08);text-decoration:none}
.lang{display:flex;gap:2px;background:rgba(255,255,255,.08);border-radius:8px;padding:3px}
.lang button{
  border:0;background:transparent;color:#AEBFCE;font:600 .74rem 'Oswald',sans-serif;
  letter-spacing:.08em;padding:6px 10px;border-radius:6px;cursor:pointer;
}
.lang button[aria-pressed="true"]{background:var(--brick);color:#fff}
.lang button:hover{color:#fff}
.nav-cta{
  display:inline-block;background:var(--brick);color:#fff;font:600 .82rem 'Oswald',sans-serif;
  letter-spacing:.1em;text-transform:uppercase;padding:11px 20px;border-radius:8px;white-space:nowrap;
}
.nav-cta:hover{background:var(--brick-dark);text-decoration:none}
.burger{display:none;margin-left:auto;background:none;border:0;cursor:pointer;padding:8px}
.burger span{display:block;width:26px;height:3px;background:#fff;margin:5px 0;border-radius:2px;transition:transform .25s,opacity .25s}
.burger[aria-expanded="true"] span:nth-child(1){transform:translateY(8px) rotate(45deg)}
.burger[aria-expanded="true"] span:nth-child(2){opacity:0}
.burger[aria-expanded="true"] span:nth-child(3){transform:translateY(-8px) rotate(-45deg)}

/* ---------- hero ---------- */
.hero{
  background:linear-gradient(180deg,var(--steel-deep) 0%,var(--steel) 68%,var(--steel-dark) 100%);
  color:#fff;padding:0;position:relative;overflow:hidden;
}
.hero-grid-lines{position:absolute;inset:0;opacity:.05;pointer-events:none;
  background-image:linear-gradient(#fff 1px,transparent 1px),linear-gradient(90deg,#fff 1px,transparent 1px);
  background-size:56px 56px;}
.hero-inner{position:relative;padding:84px 24px 0;text-align:left}
.hero h1{color:#fff;font-size:clamp(2.2rem,5.4vw,4rem);font-weight:700;text-transform:uppercase;letter-spacing:.01em;max-width:15ch}
.hero h1 em{font-style:normal;color:var(--brick)}
.hero-sub{margin:20px 0 32px;max-width:52ch;color:#C7D3DE;font-size:1.08rem;font-weight:300}
.hero-actions{display:flex;flex-wrap:wrap;gap:14px;margin-bottom:48px}
.btn{
  display:inline-block;border:0;cursor:pointer;border-radius:8px;
  font:600 .95rem 'Oswald',sans-serif;letter-spacing:.09em;text-transform:uppercase;
  padding:15px 30px;transition:transform .15s,background .15s,box-shadow .15s;
}
.btn:hover{text-decoration:none;transform:translateY(-2px)}
.btn-primary{background:var(--brick);color:#fff;box-shadow:0 6px 18px rgba(230,126,34,.35)}
.btn-primary:hover{background:var(--brick-dark)}
.btn-ghost{background:transparent;color:#fff;box-shadow:inset 0 0 0 2px rgba(255,255,255,.4)}
.btn-ghost:hover{box-shadow:inset 0 0 0 2px #fff}
.hero-stats{display:flex;flex-wrap:wrap;gap:0;border-top:1px solid rgba(255,255,255,.15);max-width:860px}
.stat{padding:22px 40px 26px 0;margin-right:40px;border-right:1px solid rgba(255,255,255,.15)}
.stat:last-child{border-right:0;margin-right:0}
.stat b{display:block;font-family:'Oswald',sans-serif;font-size:2.3rem;font-weight:600;color:var(--brick);line-height:1}
.stat span{font-size:.82rem;letter-spacing:.12em;text-transform:uppercase;color:#9FB2C4}
.hero-scene{display:block;width:100%;height:auto;margin-top:-30px}

/* excavator + crane animation */
@keyframes boom-dig{0%,100%{transform:rotate(0deg)}50%{transform:rotate(6deg)}}
@keyframes stick-dig{0%,100%{transform:rotate(0deg)}50%{transform:rotate(-9deg)}}
@keyframes hook-move{0%,100%{transform:translateY(0)}50%{transform:translateY(26px)}}
@keyframes trolley-move{0%,100%{transform:translateX(0)}50%{transform:translateX(-60px)}}
.boom-group{transform-origin:1082px 300px;animation:boom-dig 7s ease-in-out infinite}
.stick-group{transform-origin:962px 246px;animation:stick-dig 7s ease-in-out infinite}
.hook-group{animation:hook-move 9s ease-in-out infinite}
.trolley-group{animation:trolley-move 9s ease-in-out infinite}

/* ---------- about ---------- */
.about-grid{display:grid;grid-template-columns:1.05fr .95fr;gap:56px;align-items:start}
.about-text p{margin-bottom:20px}
.mission{
  border-left:5px solid var(--brick);background:var(--card);border-radius:0 var(--radius) var(--radius) 0;
  padding:18px 22px;font-style:italic;color:var(--steel);box-shadow:var(--shadow);
}
.adv-list{display:grid;gap:16px}
.adv{
  background:var(--card);border-radius:var(--radius);padding:20px 22px;display:flex;gap:16px;
  box-shadow:var(--shadow);border-top:4px solid transparent;
}
.adv:hover{border-top-color:var(--brick)}
.adv-num{
  flex:none;width:44px;height:44px;border-radius:8px;background:var(--steel);color:var(--brick);
  display:grid;place-items:center;font:600 1.15rem 'Oswald',sans-serif;
}
.adv h3{font-size:1.05rem;font-weight:600;text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px}
.adv p{font-size:.94rem;color:var(--muted)}

/* ---------- services ---------- */
.cards-4{display:grid;grid-template-columns:repeat(4,1fr);gap:20px}
.svc{
  background:var(--bg);border-radius:var(--radius);padding:26px 22px;
  border:1px solid var(--line);transition:transform .2s,box-shadow .2s,border-color .2s;
}
.section-alt .svc{background:var(--bg)}
.svc:hover{transform:translateY(-5px);box-shadow:var(--shadow-lift);border-color:var(--brick)}
.svc-icon{
  width:56px;height:56px;border-radius:10px;background:var(--steel);color:var(--brick);
  display:grid;place-items:center;margin-bottom:16px;
}
.svc-icon svg{width:32px;height:32px}
.svc h3{font-size:1.02rem;font-weight:600;text-transform:uppercase;letter-spacing:.03em;margin-bottom:8px}
.svc p{font-size:.9rem;color:var(--muted)}

/* ---------- projects ---------- */
.proj-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:24px}
.proj{
  background:var(--card);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);
  transition:transform .2s,box-shadow .2s;display:flex;flex-direction:column;
}
.proj:hover{transform:translateY(-5px);box-shadow:var(--shadow-lift)}
.proj-img{aspect-ratio:16/8.5;background:var(--steel-dark)}
.proj-img svg{width:100%;height:100%}
.proj-body{padding:22px 24px 26px}
.proj-tags{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.tag{
  font:600 .68rem 'Oswald',sans-serif;letter-spacing:.14em;text-transform:uppercase;
  padding:4px 10px;border-radius:99px;background:rgba(230,126,34,.12);color:var(--brick-dark);
}
.tag-loc{background:rgba(44,62,80,.08);color:var(--steel)}
.proj h3{font-size:1.2rem;font-weight:600;margin-bottom:8px}
.proj p{font-size:.94rem;color:var(--muted)}

/* ---------- process ---------- */
.process{background:var(--steel);color:#fff;position:relative}
.process .section-title{color:#fff}
.process .section-sub{color:#AEBFCE}
.steps{display:grid;grid-template-columns:repeat(5,1fr);gap:0;counter-reset:step}
.step{position:relative;padding:30px 22px 0 0}
.step::before{
  counter-increment:step;content:counter(step,decimal-leading-zero);
  font:600 1rem 'Oswald',sans-serif;color:var(--steel);background:var(--brick);
  width:46px;height:46px;border-radius:50%;display:grid;place-items:center;
  position:relative;z-index:1;margin-bottom:18px;color:#fff;
}
.step::after{
  content:"";position:absolute;top:53px;left:56px;right:6px;height:2px;
  background:repeating-linear-gradient(90deg,rgba(255,255,255,.35) 0 8px,transparent 8px 16px);
}
.step:last-child::after{display:none}
.step h3{color:#fff;font-size:1rem;font-weight:600;text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px}
.step p{font-size:.88rem;color:#AEBFCE}

/* ---------- perks ---------- */
.cards-3{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
.perk{
  background:var(--card);border-radius:var(--radius);padding:26px;box-shadow:var(--shadow);
  display:flex;gap:18px;align-items:flex-start;
}
.perk-icon{flex:none;width:52px;height:52px;border-radius:10px;background:rgba(230,126,34,.13);color:var(--brick-dark);display:grid;place-items:center}
.perk-icon svg{width:30px;height:30px}
.perk h3{font-size:1rem;font-weight:600;text-transform:uppercase;letter-spacing:.03em;margin-bottom:6px}
.perk p{font-size:.9rem;color:var(--muted)}

/* ---------- reviews ---------- */
.rev{
  background:var(--card);border-radius:var(--radius);padding:28px;box-shadow:var(--shadow);
  display:flex;flex-direction:column;gap:14px;
}
.stars{color:var(--brick);letter-spacing:3px;font-size:1.05rem}
.rev blockquote{font-size:.97rem;color:var(--ink);flex:1}
.rev footer{display:flex;align-items:center;gap:13px;border-top:1px solid var(--line);padding-top:16px}
.avatar{
  width:44px;height:44px;border-radius:50%;background:var(--steel);color:#fff;
  display:grid;place-items:center;font:600 1rem 'Oswald',sans-serif;flex:none;
}
.rev b{display:block;font-size:.95rem;color:var(--steel)}
.rev small{color:var(--muted);font-size:.8rem}

/* ---------- CTA form ---------- */
.cta{background:var(--steel-deep);color:#fff;position:relative;overflow:hidden}
.cta::before{content:"";position:absolute;top:0;left:0;right:0;height:8px;background:var(--hazard)}
.cta .section-title{color:#fff}
.cta-grid{display:grid;grid-template-columns:.9fr 1.1fr;gap:56px;align-items:start}
.cta-side p{color:#AEBFCE;margin-bottom:26px;max-width:44ch}
.cta-contact{display:grid;gap:14px}
.cta-contact a,.cta-contact div{display:flex;align-items:center;gap:12px;color:#E4EBF1;font-size:.98rem}
.cta-contact svg{width:20px;height:20px;color:var(--brick);flex:none}
.cta-contact a:hover{color:#fff;text-decoration:none}
form{display:grid;grid-template-columns:1fr 1fr;gap:16px;background:rgba(255,255,255,.05);padding:28px;border-radius:var(--radius);border:1px solid rgba(255,255,255,.1)}
.field{display:flex;flex-direction:column;gap:6px}
.field-full{grid-column:1/-1}
.field label{font:500 .78rem 'Oswald',sans-serif;letter-spacing:.12em;text-transform:uppercase;color:#AEBFCE}
.field input,.field select,.field textarea{
  background:#fff;border:2px solid transparent;border-radius:7px;padding:12px 14px;
  font:400 .95rem 'Roboto',sans-serif;color:var(--ink);width:100%;
}
.field textarea{min-height:110px;resize:vertical}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--brick)}
.form-note{grid-column:1/-1;display:none;background:rgba(46,160,67,.15);border:1px solid rgba(46,160,67,.5);color:#B7EEC3;padding:13px 16px;border-radius:8px;font-size:.92rem}
.form-note.show{display:block}

/* ---------- hours ---------- */
.hours-grid{display:grid;grid-template-columns:1fr 1fr;gap:24px}
.hours-card{background:var(--card);border-radius:var(--radius);padding:30px;box-shadow:var(--shadow)}
.hours-card h3{display:flex;align-items:center;gap:10px;font-size:1.05rem;text-transform:uppercase;letter-spacing:.05em;margin-bottom:14px}
.hours-card h3 svg{width:24px;height:24px;color:var(--brick)}
.hours-card p{color:var(--muted);font-size:.96rem}
.hours-time{font-family:'Oswald',sans-serif;font-size:1.3rem;color:var(--steel);margin-bottom:6px}

/* ---------- footer ---------- */
.footer{background:var(--steel-deep);color:#8FA1B3;padding:56px 0 0;font-size:.92rem}
.footer-top{display:grid;grid-template-columns:1.2fr .8fr .8fr;gap:40px;padding-bottom:40px}
.footer .brand{margin-bottom:14px}
.footer-tag{max-width:34ch}
.footer h4{font:600 .85rem 'Oswald',sans-serif;letter-spacing:.16em;text-transform:uppercase;color:#fff;margin-bottom:14px}
.footer ul{list-style:none;display:grid;gap:8px}
.footer ul a{color:#8FA1B3}
.footer ul a:hover{color:#fff;text-decoration:none}
.footer-bottom{border-top:1px solid rgba(255,255,255,.1);padding:18px 0;display:flex;flex-wrap:wrap;gap:10px;justify-content:space-between;font-size:.82rem}
.footer-bottom::after{content:"";display:none}

/* ---------- reveal ---------- */
.reveal{opacity:0;transform:translateY(26px);transition:opacity .6s ease,transform .6s ease}
.reveal.in{opacity:1;transform:none}
@media (prefers-reduced-motion:reduce){.reveal{opacity:1;transform:none}}

/* ---------- back to top ---------- */
#toTop{
  position:fixed;right:22px;bottom:22px;z-index:50;width:48px;height:48px;border-radius:10px;
  border:0;background:var(--brick);color:#fff;cursor:pointer;box-shadow:var(--shadow-lift);
  display:grid;place-items:center;opacity:0;pointer-events:none;transition:opacity .25s,transform .25s;
  transform:translateY(8px);
}
#toTop.show{opacity:1;pointer-events:auto;transform:none}
#toTop:hover{background:var(--brick-dark)}

/* ---------- responsive ---------- */
@media (max-width:1020px){
  .cards-4{grid-template-columns:repeat(2,1fr)}
  .steps{grid-template-columns:repeat(2,1fr);gap:26px}
  .step::after{display:none}
  .about-grid,.cta-grid{grid-template-columns:1fr;gap:40px}
  .footer-top{grid-template-columns:1fr 1fr}
}
@media (max-width:760px){
  section{padding:64px 0}
  .nav-links,.nav .lang,.nav-cta{display:none}
  .burger{display:block}
  .mobile-menu{
    display:none;background:var(--steel-dark);padding:12px 24px 22px;
  }
  .mobile-menu.open{display:block}
  .mobile-menu a{display:block;padding:12px 4px;color:#E4EBF1;font:500 1rem 'Oswald',sans-serif;letter-spacing:.08em;text-transform:uppercase;border-bottom:1px solid rgba(255,255,255,.08)}
  .mobile-menu a:hover{color:var(--brick);text-decoration:none}
  .mobile-menu .lang{display:inline-flex;margin-top:16px}
  .cards-3,.proj-grid,.cards-4,.hours-grid{grid-template-columns:1fr}
  .steps{grid-template-columns:1fr}
  form{grid-template-columns:1fr}
  .hero-stats{gap:0}
  .stat{padding:18px 24px 20px 0;margin-right:24px}
  .stat b{font-size:1.7rem}
  .footer-top{grid-template-columns:1fr}
}
@media (min-width:761px){.mobile-menu{display:none!important}}
</style>
</head>

/* ============================ RENDER ============================ */
const $  = s => document.querySelector(s);
const $$ = s => document.querySelectorAll(s);
let LANG = localStorage.getItem("lang") || "hr";

function fill(str, lang){
  return str
    .replaceAll("{naziv}", KLIJENT.naziv)
    .replaceAll("{grad}", KLIJENT.grad)
    .replaceAll("{adresa}", KLIJENT.adresa)
    .replaceAll("{telefon}", KLIJENT.telefon)
    .replaceAll("{email}", KLIJENT.email)
    .replaceAll("{godina}", KLIJENT.godina)
    .replaceAll("{zaposlenici}", KLIJENT.zaposlenici)
    .replaceAll("{oib}", KLIJENT.oib)
    .replaceAll("{iskustvo}", KLIJENT.iskustvo)
    .replaceAll("{spec}", KLIJENT.spec[lang])
    .replaceAll("{podrucje}", KLIJENT.podrucje[lang]);
}

function render(lang){
  LANG = lang;
  localStorage.setItem("lang", lang);
  document.documentElement.lang = lang;
  const t = T[lang];

  $$(".lang button").forEach(b => b.setAttribute("aria-pressed", String(b.dataset.lang === lang)));

  // plain data-t nodes
  $$("[data-t]").forEach(el => {
    const v = t[el.dataset.t];
    if (typeof v === "string") el.innerHTML = fill(v, lang);
  });
  $("#heroTitle").innerHTML = fill(t["hero.title"], lang);

  // client data nodes
  $$("[data-k]").forEach(el => {
    const k = el.dataset.k;
    if (k === "naziv-kratko" || k === "naziv-kratko2")
      el.innerHTML = `${KLIJENT.nazivKratko}<small>${t["brand.small"]}</small>`;
    else el.textContent = KLIJENT[k];
  });
  $("#ctaPhone").href = "tel:" + KLIJENT.telefon.replace(/\s/g,"");
  $("#footPhone").href = "tel:" + KLIJENT.telefon.replace(/\s/g,"");
  $("#ctaMail").href = "mailto:" + KLIJENT.email;
  $("#footMail").href = "mailto:" + KLIJENT.email;

  // nav
  const navHTML = t.nav.map(([h,l]) => `<li><a href="${h}">${l}</a></li>`).join("");
  $("#navLinks").innerHTML = navHTML;
  $("#footNav").innerHTML = navHTML;
  $("#mobileMenu").innerHTML =
    t.nav.map(([h,l]) => `<a href="${h}">${l}</a>`).join("") +
    `<a href="#procjena" style="color:var(--brick)">${t["nav.cta"]}</a>` +
    `<div class="lang" role="group" aria-label="Jezik">${["hr","en","de"].map(c =>
      `<button type="button" data-lang="${c}" aria-pressed="${c===lang}">${c.toUpperCase()}</button>`).join("")}</div>`;
  bindLang($("#mobileMenu"));
  $("#mobileMenu").querySelectorAll("a").forEach(a => a.addEventListener("click", closeMenu));

  // hero stats
  $("#heroStats").innerHTML = t.stats.map(([key,label]) =>
    `<div class="stat"><b data-count="${KLIJENT[key]}">0</b><span>${label}</span></div>`).join("");
  animateCounters();

  // about advantages
  $("#advList").innerHTML = t.advantages.map(([h,p],i) =>
    `<div class="adv reveal"><div class="adv-num" aria-hidden="true">${i+1}</div><div><h3>${h}</h3><p>${fill(p,lang)}</p></div></div>`).join("");

  // services
  $("#svcGrid").innerHTML = t.services.map(([icon,h,p]) =>
    `<article class="svc reveal"><div class="svc-icon" aria-hidden="true"><svg><use href="#${icon}"/></svg></div><h3>${h}</h3><p>${p}</p></article>`).join("");

  // projects
  $("#projGrid").innerHTML = t.projects.map(([type,loc,name,desc,alt],i) =>
    `<article class="proj reveal">
      <div class="proj-img" role="img" aria-label="${alt}">${PROJ_ART[i]}</div>
      <div class="proj-body">
        <div class="proj-tags"><span class="tag">${t.projTypes[type]}</span><span class="tag tag-loc">${loc}</span></div>
        <h3>${name}</h3><p>${desc}</p>
      </div>
    </article>`).join("");

  // steps
  $("#stepsGrid").innerHTML = t.steps.map(([h,p]) =>
    `<div class="step reveal"><h3>${h}</h3><p>${p}</p></div>`).join("");

  // perks
  $("#perkGrid").innerHTML = t.perks.map(([icon,h,p]) =>
    `<article class="perk reveal"><div class="perk-icon" aria-hidden="true"><svg><use href="#${icon}"/></svg></div><div><h3>${h}</h3><p>${p}</p></div></article>`).join("");

  // reviews
  $("#revGrid").innerHTML = t.reviews.map(([name,type,text]) => {
    const init = name.split(" ").map(w => w[0]).join("");
    return `<article class="rev reveal">
      <div class="stars" aria-label="5/5">★★★★★</div>
      <blockquote>„${text}“</blockquote>
      <footer><span class="avatar" aria-hidden="true">${init}</span><span><b>${name}</b><small>${type}</small></span></footer>
    </article>`;
  }).join("");

  // form select
  $("#f-type").innerHTML = t.formTypes.map(o => `<option>${o}</option>`).join("");

  observeReveals();
}

/* ============================ interakcije ============================ */
function bindLang(scope){
  scope.querySelectorAll("[data-lang]").forEach(b =>
    b.addEventListener("click", () => render(b.dataset.lang)));
}
bindLang(document.querySelector("header .lang"));

const burger = $("#burger");
function closeMenu(){
  burger.setAttribute("aria-expanded","false");
  $("#mobileMenu").classList.remove("open");
}
burger.addEventListener("click", () => {
  const open = burger.getAttribute("aria-expanded") === "true";
  burger.setAttribute("aria-expanded", String(!open));
  $("#mobileMenu").classList.toggle("open", !open);
});

$("#quoteForm").addEventListener("submit", e => {
  e.preventDefault();
  const f = e.target;
  if (!f.reportValidity()) return;
  $("#formNote").classList.add("show");
  f.reset();
  setTimeout(() => $("#formNote").classList.remove("show"), 6000);
});

const toTop = $("#toTop");
addEventListener("scroll", () => toTop.classList.toggle("show", scrollY > 600), {passive:true});
toTop.addEventListener("click", () => scrollTo({top:0, behavior:"smooth"}));

/* brojači u heroju */
const reduceMotion = matchMedia("(prefers-reduced-motion: reduce)").matches;
function animateCounters(){
  $$("#heroStats [data-count]").forEach(el => {
    const target = +el.dataset.count;
    if (reduceMotion){ el.textContent = target + "+"; return; }
    const t0 = performance.now(), dur = 1400;
    (function tick(now){
      const p = Math.min((now - t0) / dur, 1);
      el.textContent = Math.round(target * (1 - Math.pow(1 - p, 3))) + "+";
      if (p < 1) requestAnimationFrame(tick);
    })(t0);
  });
}

/* scroll reveal */
let io;
function observeReveals(){
  if (io) io.disconnect();
  if (reduceMotion){ $$(".reveal").forEach(el => el.classList.add("in")); return; }
  io = new IntersectionObserver(entries => {
    entries.forEach(en => { if (en.isIntersecting){ en.target.classList.add("in"); io.unobserve(en.target); } });
  }, {threshold:.12});
  $$(".reveal").forEach(el => io.observe(el));
}

render(LANG);
</script>
